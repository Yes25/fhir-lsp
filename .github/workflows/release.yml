name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: fhir-lsp-linux-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: fhir-lsp-macos-aarch64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: fhir-lsp-macos-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: fhir-lsp-windows-x86_64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install zstd (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y zstd

      - name: Install zstd (macOS)
        if: runner.os == 'macOS'
        run: brew install zstd

      - name: Install zstd (Windows)
        if: runner.os == 'Windows'
        run: choco install zstandard

      - name: Compress assets
        run: bash scripts/compress_assets.sh

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage binary (Unix)
        if: runner.os != 'Windows'
        run: cp target/${{ matrix.target }}/release/fhir-lsp ${{ matrix.artifact }}

      - name: Stage binary (Windows)
        if: runner.os == 'Windows'
        run: cp target/${{ matrix.target }}/release/fhir-lsp.exe ${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Create release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            fhir-lsp-linux-x86_64/fhir-lsp-linux-x86_64
            fhir-lsp-macos-aarch64/fhir-lsp-macos-aarch64
            fhir-lsp-macos-x86_64/fhir-lsp-macos-x86_64
            fhir-lsp-windows-x86_64.exe/fhir-lsp-windows-x86_64.exe
